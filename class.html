<!DOCTYPE html>
<html>
<head>
    <title>Attendance Management System</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #eeeeee;
        }

        h2{
            text-align: center;
        }

        .container{
            display: flex;
            gap: 30px;
        }

        .left,.right{
            width: 50%;
            padding: 20px;
            border: 1px solid #dcdcdc;
            background-color: #f8f9fa;
            border-radius: 8px;
            box-shadow: 0px 2px 5px rgba(0,0,0,0.1);
        }

        input{
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button{
            padding: 8px 15px;
            margin-right: 5px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            background-color: #007BFF;
            color: white;
        }

        button:hover{
            background-color: #0056b3;
        }

        table{
            width: 100%;
            border-collapse: collapse;
        }

        th,td{
            border: 1px solid black;
            padding: 8px;
            text-align: center;
        }

        th{
            background-color: #e9ecef;
        }

        tr:nth-child(even){
            background-color: #f8f9fa;
        }

        tr:hover{
            background-color: #f1f1f1;
        }
    </style>
</head>

<body>

<h2>Attendance Management System</h2>

<div class="container">

    <!-- Form Section -->
    <div class="left">

        <form id="attendanceForm">

            <label>Roll No</label>
            <input type="text"
                   id="rollno"
                   placeholder="Enter Roll No"
                   required
                   oninvalid="this.setCustomValidity('Please enter valid Roll No')"
                   oninput="this.setCustomValidity('')">

            <label>Name</label>
            <input type="text"
                   id="name"
                   placeholder="Enter Name"
                   required
                   oninvalid="this.setCustomValidity('Please enter Name')"
                   oninput="this.setCustomValidity('')">

            <label>Department</label>
            <input type="text"
                   id="dept"
                   placeholder="Enter Department"
                   required
                   oninvalid="this.setCustomValidity('Please enter Department')"
                   oninput="this.setCustomValidity('')">

            <label>Attendance %</label>
            <input type="number"
                   id="attendance"
                   placeholder="Enter Attendance Percentage"
                   min="0"
                   max="100"
                   required
                   oninvalid="this.setCustomValidity('Please enter Attendance between 0 and 100')"
                   oninput="this.setCustomValidity('')">

            <button type="button" onclick="addRecord()">Add</button>
            <button type="button" onclick="updateRecord()">Update</button>

        </form>

    </div>

    <!-- Table Section -->
    <div class="right">

        <table id="studentTable">

            <tr>
                <th>Roll No</th>
                <th>Name</th>
                <th>Department</th>
                <th>Attendance %</th>
                <th>Action</th>
            </tr>

        </table>

    </div>

</div>

<script>

let selectedRow = null;

function addRecord()
{
    let form = document.getElementById("attendanceForm");

    if(!form.checkValidity())
    {
        form.reportValidity();
        return;
    }

    let rollno = document.getElementById("rollno").value;
    let name = document.getElementById("name").value;
    let dept = document.getElementById("dept").value;
    let attendance = document.getElementById("attendance").value;

    let table = document.getElementById("studentTable");

    let row = table.insertRow();

    row.insertCell(0).innerHTML = rollno;
    row.insertCell(1).innerHTML = name;
    row.insertCell(2).innerHTML = dept;
    row.insertCell(3).innerHTML = attendance;

    row.insertCell(4).innerHTML =
    `<button onclick="editRecord(this)">Edit</button>
     <button onclick="deleteRecord(this)">Delete</button>`;

    clearForm();
}

function editRecord(btn)
{
    selectedRow = btn.parentElement.parentElement;

    document.getElementById("rollno").value =
    selectedRow.cells[0].innerHTML;

    document.getElementById("name").value =
    selectedRow.cells[1].innerHTML;

    document.getElementById("dept").value =
    selectedRow.cells[2].innerHTML;

    document.getElementById("attendance").value =
    selectedRow.cells[3].innerHTML;
}

function updateRecord()
{
    if(selectedRow == null)
    {
        return;
    }

    let form = document.getElementById("attendanceForm");

    if(!form.checkValidity())
    {
        form.reportValidity();
        return;
    }

    selectedRow.cells[0].innerHTML =
    document.getElementById("rollno").value;

    selectedRow.cells[1].innerHTML =
    document.getElementById("name").value;

    selectedRow.cells[2].innerHTML =
    document.getElementById("dept").value;

    selectedRow.cells[3].innerHTML =
    document.getElementById("attendance").value;

    clearForm();
    selectedRow = null;
}

function deleteRecord(btn)
{
    let row = btn.parentElement.parentElement;
    row.remove();
}

function clearForm()
{
    document.getElementById("rollno").value = "";
    document.getElementById("name").value = "";
    document.getElementById("dept").value = "";
    document.getElementById("attendance").value = "";
}

</script>

</body>
</html>
