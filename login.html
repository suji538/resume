<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flip-Amazon Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(
        135deg,
        #c7d2fe,
        #ddd6fe,
        #f5f3ff
    );
}

/* Login Card */

.login-box{
    width:420px;
    padding:35px;
    border-radius:25px;

    background:rgba(255,255,255,0.7);
    backdrop-filter:blur(15px);

    box-shadow:
    0 10px 30px rgba(0,0,0,0.15),
    0 0 20px rgba(124,58,237,0.15);

    animation:fadeIn 0.8s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* Header */

.logo-section{
    text-align:center;
    margin-bottom:30px;
}

.logo-section h1{
    color:#6d28d9;
    font-size:34px;
    margin-bottom:5px;
}

.logo-section p{
    color:#666;
    font-size:14px;
}

/* Floating Inputs */

.input-group{
    position:relative;
    margin-bottom:22px;
}

.input-group input{
    width:100%;
    padding:15px;
    border:1px solid #ddd;
    border-radius:12px;
    outline:none;
    font-size:15px;
    background:white;
    transition:0.3s;
}

.input-group input:focus{
    border-color:#7c3aed;
    box-shadow:0 0 10px rgba(124,58,237,0.15);
}

.input-group label{
    position:absolute;
    left:15px;
    top:15px;
    color:#777;
    background:white;
    transition:0.3s;
    pointer-events:none;
}

.input-group input:focus + label,
.input-group input:valid + label{
    top:-10px;
    left:12px;
    font-size:12px;
    color:#7c3aed;
    padding:0 5px;
}

/* Password Box */

.password-wrapper{
    position:relative;
}

.show-btn{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    color:#666;
    font-size:18px;
}

/* Remember Me */

.checkbox-label{
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:20px;
    color:#444;
}

/* Login Button */

.login-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;

    background:linear-gradient(
        135deg,
        #7c3aed,
        #9333ea
    );

    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;

    transition:0.3s;
}

.login-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(124,58,237,0.3);
}

/* Bottom Links */

.bottom-container{
    margin-top:18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.cancelbtn{
    border:none;
    background:#ef4444;
    color:white;
    padding:10px 18px;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}

.cancelbtn:hover{
    background:#dc2626;
}

.psw a{
    text-decoration:none;
    color:#7c3aed;
    font-weight:600;
}

.psw a:hover{
    text-decoration:underline;
}

/* Success Message */

.footer-text{
    text-align:center;
    margin-top:20px;
    color:#888;
    font-size:13px;
}

</style>
</head>

<body>

<form class="login-box" onsubmit="return validateLogin()">

    <div class="logo-section">
        <h1>Flip-Amazon</h1>
        <p>Welcome Back 👋</p>
    </div>

    <!-- Email -->

    <div class="input-group">
        <input
            type="email"
            id="email"
            required>
        <label>Email Address</label>
    </div>

    <!-- Password -->

    <div class="input-group password-wrapper">
        <input
            type="password"
            id="password"
            required>
        <label>Password</label>

        <span
            class="show-btn"
            onclick="togglePassword()">
            👁
        </span>
    </div>

    <!-- Remember -->

    <label class="checkbox-label">
        <input type="checkbox" checked>
        Remember Me
    </label>

    <!-- Login Button -->

    <button
        type="submit"
        class="login-btn">
        Login Now
    </button>

    <!-- Bottom -->

    <div class="bottom-container">

        <button
            type="reset"
            class="cancelbtn">
            Cancel
        </button>

        <span class="psw">
            <a href="#">
                Forgot Password?
            </a>
        </span>

    </div>

    <div class="footer-text">
        Secure Login Portal
    </div>

</form>

<script>

function togglePassword()
{
    let password =
    document.getElementById("password");

    if(password.type === "password")
    {
        password.type = "text";
    }
    else
    {
        password.type = "password";
    }
}

function validateLogin()
{
    let email =
    document.getElementById("email").value;

    let password =
    document.getElementById("password").value;

    if(
        email === "admin@gmail.com" &&
        password === "admin123"
      )
    {
        alert("✅ Login Successful!");
        return true;
    }
    else
    {
        alert("❌ Invalid Email or Password!");
        return false;
    }
}

</script>

</body>
</html>
